spring.application.name=TestingApp


spring.datasource.url=jdbc:mysql://${DB_HOST_URL}:3306/prod?useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

logging.level.com.nithin.TestingApp.service.impl.EmployeeServiceImpl=debug

#fly way
#spring.flyway.baseline-on-migrate=true
# use above line config when u already have tables in database. If you database is empty no need for this.
#First keep this line and the application and flyway will create a baseline and know about the tables you have in database and you can migrate
my.variable=prod